<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Space Grotesk', sans-serif; }
  
  .glass-card {
    background: rgba(17, 17, 17, 0.75);
    backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* ✨ THE CUTE NEON-PULSE SCROLLBAR ✨ */
  .custom-scroll::-webkit-scrollbar {
    width: 6px; 
  }

  .custom-scroll::-webkit-scrollbar-track {
    background: transparent; 
    margin: 20px; 
  }

  .custom-scroll::-webkit-scrollbar-thumb {
    background: #e31937;
    border-radius: 100px;
    /* This creates the "pill" look */
    border: 2px solid rgba(17, 17, 17, 0); 
    background-clip: padding-box;
    box-shadow: 0 0 8px rgba(227, 25, 55, 0.6);
    transition: all 0.3s ease;
  }

  .custom-scroll::-webkit-scrollbar-thumb:hover {
    background: #ff2e4d;
    box-shadow: 0 0 15px rgba(227, 25, 55, 0.9);
  }

  .star {
    position: absolute;
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1); }
  }

  .orb-red { background: rgba(220, 38, 38, 0.15); }
</style>
</head>

<body>
<div class="min-h-screen bg-gradient-to-br from-gray-950 via-[#0a0a0a] to-red-950 flex flex-col items-center justify-center p-4 sm:p-8 relative overflow-hidden">
  
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
    <div class="absolute w-64 h-64 sm:w-96 sm:h-96 orb-red rounded-full blur-3xl opacity-60 animate-pulse left-[-10%] top-[-10%] sm:left-1/4 sm:top-1/4"></div>
    <div class="absolute w-64 h-64 sm:w-80 sm:h-80 bg-red-900/10 rounded-full blur-3xl opacity-60 animate-pulse right-[-10%] bottom-[-10%] sm:right-1/3 sm:bottom-1/4"></div>
  </div>

  <div class="mb-8 sm:mb-10 flex flex-col items-center relative z-10">
    <img class="h-8 md:h-10 w-auto object-contain relative z-10" src="img/logo/tesla-logo.png" alt="Tesla Logo">
  </div>

  <div class="glass-card custom-scroll w-full max-w-[95%] sm:max-w-xl rounded-[2.5rem] sm:rounded-[3rem] shadow-[0_20px_60px_rgba(0,0,0,0.7)] p-6 sm:p-10 relative z-10 max-h-[80vh] overflow-y-auto">
    <h2 class="text-white text-xl sm:text-2xl font-bold text-center mb-8 tracking-tight">Create Account</h2>

    <form id="signupForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
      
      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </span>
        <input type="text" placeholder="Username *" required class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-white text-sm transition-all placeholder-zinc-700">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </span>
        <input type="text" placeholder="Full Name *" required class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-white text-sm transition-all placeholder-zinc-700">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </span>
        <input type="email" placeholder="Email Address *" required class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-white text-sm transition-all placeholder-zinc-700">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        </span>
        <input type="tel" placeholder="Phone Number *" required class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-white text-sm transition-all placeholder-zinc-700">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </span>
        <input type="password" placeholder="Password *" required class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-white text-sm transition-all placeholder-zinc-700">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </span>
        <input type="password" placeholder="Confirm Password *" required class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-white text-sm transition-all placeholder-zinc-700">
      </div>

      <div class="relative md:col-span-2 group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </span>
        <select required class="block w-full pl-11 pr-10 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-zinc-400 text-sm appearance-none transition-all cursor-pointer">
          <option value="" disabled selected class="bg-zinc-900">Choose Country *</option>
          <option value="USA" class="bg-zinc-900">United States</option>
          <option value="UK" class="bg-zinc-900">United Kingdom</option>
          <option value="Canada" class="bg-zinc-900">Canada</option>
          <option value="Nigeria" class="bg-zinc-900">Nigeria</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-red-600">
          <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
        </div>
      </div>

      <div class="relative md:col-span-2 group">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600 group-focus-within:text-red-500 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        </span>
        <input type="text" placeholder="Referral ID (Optional)" class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-800/50 rounded-2xl focus:ring-1 focus:ring-red-600 focus:border-red-600 outline-none text-white text-sm transition-all placeholder-zinc-700">
      </div>

      <div class="md:col-span-2 flex justify-center py-2">
        <div class="bg-white/95 rounded-2xl p-3 flex items-center gap-4 shadow-[0_10px_30px_rgba(227,25,55,0.15)] scale-90 sm:scale-100 border-l-4 border-red-600">
          <input type="checkbox" required class="w-5 h-5 rounded border-gray-300 text-red-600 focus:ring-red-600">
          <span class="text-gray-800 text-sm font-bold">I'm not a robot</span>
          <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" class="w-7 h-7 ml-4" alt="reCAPTCHA">
        </div>
      </div>

      <div class="md:col-span-2">
        <button type="submit" class="w-full bg-[#e31937] hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition-all shadow-[0_15px_30px_rgba(227,25,55,0.3)] active:scale-95 text-lg">
          Create Account
        </button>
      </div>

      <div class="md:col-span-2 text-center pt-2">
        <p class="text-zinc-500 text-xs font-medium">
          Already have an account? <a href="login.html" class="text-white font-black hover:text-red-500 underline underline-offset-8 decoration-red-600/50 transition-colors">Login Here</a>
        </p>
      </div>
    </form>
  </div>

  <footer class="mt-8 relative z-10 px-4">
    <p class="text-zinc-400 text-[9px] tracking-[0.4em] uppercase text-center leading-relaxed">
       © Copyright 2026 Tesla Assets Finance <br> All Rights Reserved.
    </p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Background Stars
      const bg = document.querySelector('.min-h-screen');
      const starCount = window.innerWidth < 640 ? 40 : 80;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        star.style.width = star.style.height = `${Math.random() * 2 + 1}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDuration = `${Math.random() * 3 + 2}s`;
        star.style.animationDelay = `${Math.random() * 2}s`;
        bg.appendChild(star);
      }

      // Submission logic
      const form = document.getElementById('signupForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (form.checkValidity()) {
          window.location.href = 'login.html';
        } else {
          alert("Oops! Please go back and fill in all the required fields marked with *.");
          form.reportValidity();
        }
      });
    });
  </script>
</div>
</body>
</html>
