<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Sign-up - Tesla-smart-finance</title>
    <link rel="icon" type="image/webp" href="img/logo/tesla-fav.webp">

    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #050505;
        }
        
        .glass-card {
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Hide Scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .star {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
            opacity: 0;
            pointer-events: none;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

   /* ✨ Internal Custom Scrollbar (Neon Pulse) ✨ */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #e31937;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(227, 25, 55, 0.5);
        }
    </style>
</head>

<body class="no-scrollbar">
<a href="index.html" 
   class="fixed top-6 left-6 z-[150] group flex items-center space-x-3 px-5 py-2.5 
          bg-white/10 dark:bg-black/20 backdrop-blur-md border border-zinc-200/50 dark:border-zinc-800/50 
          rounded-full shadow-xl transition-all duration-500 hover:scale-105 hover:border-red-600/50">
    
    <svg class="w-4 h-4 text-yellow-400 animate-pulse group-hover:rotate-45 transition-transform" 
         fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
    </svg>

    <span class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-800 dark:text-zinc-200 group-hover:text-red-600 transition-colors">
        Back to Home
    </span>

    <svg class="w-4 h-4 text-yellow-400 animate-pulse group-hover:-rotate-45 transition-transform" 
         fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
    </svg>

    <div class="absolute inset-0 rounded-full bg-red-600/0 group-hover:bg-red-600/5 blur-md transition-all"></div>
</a>


<div class="min-h-screen bg-gradient-to-br from-indigo-950 via-gray-950 to-red-950 flex flex-col items-center justify-start sm:justify-center p-6 sm:p-8 relative overflow-x-hidden">
  
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
    <div class="absolute w-72 h-72 sm:w-96 sm:h-96 bg-purple-500/10 rounded-full blur-[100px] opacity-60 animate-pulse left-[-10%] top-[-10%] sm:left-1/4 sm:top-1/4"></div>
    <div class="absolute w-72 h-72 sm:w-80 sm:h-80 bg-red-500/10 rounded-full blur-[100px] opacity-60 animate-pulse right-[-10%] bottom-[-10%] sm:right-1/4 sm:bottom-1/4"></div>
  </div>

  <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-600 to-transparent opacity-40"></div>

  <div class="mt-12 mb-10 sm:mt-0 sm:mb-12 flex flex-col items-center relative z-10">
    <img class="h-10 md:h-12 w-auto object-contain" src="img/logo/tesla-logo.webp" alt="Tesla Logo">
  </div>

  <div class="glass-card custom-scroll w-full max-w-xl rounded-[2.5rem] sm:rounded-[3.5rem] shadow-[0_30px_70px_rgba(0,0,0,0.9)] p-7 sm:p-12 relative z-10 max-h-[85vh] overflow-y-auto">
    <h2 class="text-white text-2xl sm:text-4xl font-bold text-center mb-10 tracking-tight">Create Account</h2>

    <form id="signupForm" class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-7">
      
      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-zinc-500 group-focus-within:text-red-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </span>
        <input type="text" placeholder="Username *" required class="block w-full pl-14 pr-4 py-5 bg-black/60 border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none text-white text-[17px] transition-all placeholder-zinc-500 shadow-inner">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-zinc-500 group-focus-within:text-red-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </span>
        <input type="text" placeholder="Full Name *" required class="block w-full pl-14 pr-4 py-5 bg-black/60 border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none text-white text-[17px] transition-all placeholder-zinc-500 shadow-inner">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-zinc-500 group-focus-within:text-red-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </span>
        <input type="email" placeholder="Email Address *" required class="block w-full pl-14 pr-4 py-5 bg-black/60 border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none text-white text-[17px] transition-all placeholder-zinc-500 shadow-inner">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-zinc-500 group-focus-within:text-red-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        </span>
        <input type="tel" placeholder="Phone Number *" required class="block w-full pl-14 pr-4 py-5 bg-black/60 border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none text-white text-[17px] transition-all placeholder-zinc-500 shadow-inner">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-zinc-500 group-focus-within:text-red-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </span>
        <input type="password" placeholder="Password *" required class="block w-full pl-14 pr-4 py-5 bg-black/60 border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none text-white text-[17px] transition-all placeholder-zinc-500 shadow-inner">
      </div>

      <div class="relative group">
        <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-zinc-500 group-focus-within:text-red-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </span>
        <input type="password" placeholder="Confirm Password *" required class="block w-full pl-14 pr-4 py-5 bg-black/60 border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none text-white text-[17px] transition-all placeholder-zinc-500 shadow-inner">
      </div>

      <div class="relative md:col-span-2 group">
        <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-zinc-500 group-focus-within:text-red-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </span>
        <select required class="block w-full pl-14 pr-10 py-5 bg-black/60 border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none text-zinc-300 text-[17px] appearance-none transition-all cursor-pointer shadow-inner">
          <option value="" disabled selected class="bg-zinc-900">Choose Country *</option>
          <option value="USA" class="bg-zinc-900">United States</option>
          <option value="UK" class="bg-zinc-900">United Kingdom</option>
          <option value="Canada" class="bg-zinc-900">Canada</option>
          <option value="Nigeria" class="bg-zinc-900">Nigeria</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-red-600">
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
        </div>
      </div>

      <div class="md:col-span-2 flex justify-center py-6">
        <div class="bg-white/95 rounded-[1.5rem] p-5 flex items-center gap-5 shadow-2xl border-l-8 border-red-600 w-full max-w-sm">
          <input type="checkbox" required class="w-8 h-8 rounded border-gray-300 text-red-600 focus:ring-red-600">
          <span class="text-gray-800 text-lg font-bold flex-grow">I'm not a robot</span>
          <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" class="w-10 h-10" alt="reCAPTCHA">
        </div>
      </div>

      <div class="md:col-span-2">
        <button type="submit" class="w-full bg-[#e31937] hover:bg-red-700 text-white font-black py-4 rounded-2xl transition-all shadow-[0_20px_40px_rgba(227,25,55,0.4)] active:scale-95 text-2xl tracking-wide">
          Create Account
        </button>
      </div>

      <div class="md:col-span-2 text-center pt-6 pb-2">
        <p class="text-zinc-400 text-lg font-medium">
          Already have an account? <br class="sm:hidden"> 
          <a href="login.html" class="text-white font-black hover:text-red-500 underline underline-offset-8 decoration-red-600 transition-colors">Login Here</a>
        </p>
      </div>
    </form>
  </div>

  <footer class="mt-12 mb-8 relative z-10 px-4">
    <p class="text-zinc-500 text-[11px] tracking-[0.5em] uppercase text-center leading-relaxed">
        © Copyright 2026 Tesla Assets Finance <br> All Rights Reserved.
    </p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const bg = document.querySelector('.min-h-screen');
      const starCount = window.innerWidth < 640 ? 50 : 80;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        star.style.width = star.style.height = `${Math.random() * 2 + 1}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDuration = `${Math.random() * 3 + 2}s`;
        star.style.animationDelay = `${Math.random() * 2}s`;
        bg.appendChild(star);
      }
    });
  </script>
</div>
</body>
</html>
